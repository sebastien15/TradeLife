<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PIN / Biometric Auth</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#121212",
                        "surface-dark": "#1E1E1E",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .pin-dot {
            width: 12px;
            height: 12px;
            border-radius: 9999px;
            border: 2px solid #334155;
            transition: all 0.2s ease;
        }
        .pin-dot.filled {
            background-color: #0b4c4c;
            border-color: #0b4c4c;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-end">
<!-- Background Content Mockup (The App behind the Modal) -->
<div class="fixed inset-0 p-6 flex flex-col gap-6 opacity-40 pointer-events-none">
<div class="flex justify-between items-center">
<div class="w-10 h-10 rounded-full bg-primary/20"></div>
<span class="material-symbols-outlined">notifications</span>
</div>
<div class="h-40 w-full rounded-xl bg-primary/10 border border-primary/20 p-4">
<div class="w-24 h-4 bg-primary/30 rounded mb-2"></div>
<div class="w-48 h-8 bg-primary/40 rounded"></div>
</div>
<div class="space-y-4">
<div class="h-16 w-full rounded-lg bg-slate-800/50"></div>
<div class="h-16 w-full rounded-lg bg-slate-800/50"></div>
<div class="h-16 w-full rounded-lg bg-slate-800/50"></div>
</div>
</div>
<!-- Bottom Sheet Backdrop -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-10"></div>
<!-- Bottom Sheet Container -->
<div class="relative z-20 w-full max-w-md mx-auto bg-surface-dark rounded-t-xl shadow-2xl flex flex-col animate-in slide-in-from-bottom duration-300">
<!-- Bottom Sheet Handle -->
<div class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-700"></div>
</div>
<!-- Content Header -->
<div class="px-6 pt-2 pb-6 text-center">
<h2 class="text-xl font-bold tracking-tight text-slate-100">Authorize Payment</h2>
<p class="text-slate-400 text-sm mt-1">Confirm $1,250.00 transfer to <span class="text-slate-200 font-medium">Sarah Jenkins</span></p>
</div>
<!-- PIN Display Area -->
<div class="flex justify-center gap-4 py-8">
<div class="pin-dot filled"></div>
<div class="pin-dot filled"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
</div>
<!-- Numeric Keypad -->
<div class="px-8 pb-10 grid grid-cols-3 gap-x-4 gap-y-6">
<!-- Row 1 -->
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">1</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">2</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">3</span>
</button>
<!-- Row 2 -->
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">4</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">5</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">6</span>
</button>
<!-- Row 3 -->
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">7</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">8</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">9</span>
</button>
<!-- Row 4 -->
<button class="flex items-center justify-center h-16 w-full rounded-xl text-primary hover:text-primary/80 transition-colors">
<span class="material-symbols-outlined text-3xl">face</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl bg-slate-800/40 hover:bg-slate-800/60 active:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">0</span>
</button>
<button class="flex items-center justify-center h-16 w-full rounded-xl text-slate-400 hover:text-slate-100 transition-colors">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
<!-- Footer Actions -->
<div class="px-8 pb-12 flex flex-col items-center gap-4">
<button class="text-primary text-sm font-semibold hover:underline">Forgot PIN?</button>
<button class="w-full py-4 text-slate-400 font-medium hover:text-slate-200 transition-colors">Cancel</button>
</div>
<!-- Security Badge Image/Placeholder -->
<div class="absolute top-4 right-6 opacity-20">
<span class="material-symbols-outlined text-4xl text-primary">security</span>
</div>
</div>
<!-- Background Pattern/Accent -->
<div class="fixed bottom-0 left-0 right-0 h-1 bg-primary/30"></div>
</body></html>
