<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display">
<!-- Background Content (Simulated Transaction Screen) -->
<div class="fixed inset-0 flex flex-col p-6 opacity-40 pointer-events-none">
<header class="flex justify-between items-center mb-8">
<span class="material-symbols-outlined">arrow_back</span>
<h1 class="font-semibold text-lg">Send Money</h1>
<div class="w-6"></div>
</header>
<div class="flex-1 space-y-6">
<div class="bg-slate-200 dark:bg-primary/20 p-6 rounded-xl border border-slate-300 dark:border-primary/30">
<p class="text-sm opacity-70">Recipient</p>
<p class="text-xl font-bold mt-1">Papa Mukwano</p>
<p class="text-sm opacity-70 mt-4">Amount</p>
<p class="text-3xl font-bold text-primary mt-1">50,750 RWF</p>
</div>
<div class="h-12 bg-slate-200 dark:bg-primary/10 rounded-lg"></div>
<div class="h-12 bg-slate-200 dark:bg-primary/10 rounded-lg w-2/3"></div>
</div>
</div>
<!-- Bottom Sheet Authentication Overlay -->
<div class="fixed inset-0 bg-black/60 flex flex-col justify-end z-50">
<!-- Bottom Sheet Container -->
<div class="bg-white dark:bg-[#0a1414] rounded-t-xl overflow-hidden animate-slide-up shadow-2xl max-w-md mx-auto w-full">
<!-- Handle -->
<div class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-primary/40"></div>
</div>
<!-- Content Area -->
<div class="px-6 pt-4 pb-8 flex flex-col items-center">
<h4 class="text-primary font-bold text-xs uppercase tracking-widest mb-1">Security Verification</h4>
<h3 class="text-xl font-bold text-slate-900 dark:text-white text-center">Enter PIN</h3>
<!-- Amount Reminder -->
<div class="mt-4 px-4 py-2 bg-slate-100 dark:bg-primary/10 rounded-full border border-slate-200 dark:border-primary/20">
<p class="text-sm font-medium text-slate-600 dark:text-slate-300">
<span class="font-bold text-slate-900 dark:text-white">50,750 RWF</span> to Papa Mukwano
                    </p>
</div>
<!-- PIN Visualizer (4 Dots) -->
<div class="flex gap-6 my-10">
<div class="w-4 h-4 rounded-full bg-primary ring-4 ring-primary/20"></div>
<div class="w-4 h-4 rounded-full bg-primary ring-4 ring-primary/20"></div>
<div class="w-4 h-4 rounded-full bg-slate-200 dark:bg-primary/20"></div>
<div class="w-4 h-4 rounded-full bg-slate-200 dark:bg-primary/20"></div>
</div>
<!-- Mini Numeric Keypad -->
<div class="w-full max-w-[280px] numpad-grid mb-8">
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">1</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">2</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">3</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">4</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">5</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">6</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">7</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">8</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">9</span>
</button>
<div class="h-14 w-full"></div>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="text-2xl font-semibold">0</span>
</button>
<button class="flex items-center justify-center h-14 w-full rounded-xl hover:bg-slate-100 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
<!-- Actions -->
<div class="w-full space-y-4">
<button class="w-full bg-primary text-white font-semibold py-4 rounded-xl flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined">face</span>
                        Use Face ID
                    </button>
<div class="flex justify-center">
<button class="text-slate-500 dark:text-slate-400 text-sm font-medium hover:text-slate-900 dark:hover:text-white transition-colors py-2">
                            Cancel Transaction
                        </button>
</div>
</div>
<!-- Biometric Branding Image (Subtle) -->
<div class="mt-6 flex flex-col items-center opacity-40">
<div class="w-12 h-12 bg-center bg-no-repeat bg-contain" data-alt="Abstract biometric fingerprint and scan pattern" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBqogG_0L-iKfN4UJ5XO3fV1S2V2oH80OLZ2h8XYGhatPv1TFnBkXL0Xnng-cgRdBCEtJOif9f-AoD9IQDXfdXB4rCAz-cNtLVA5JlSKYiTErbT57TB2TwH7V-V3yHtFdilnI6BlEc2HHiQLyRrii8OJbR2oYWV6_YUymMiq1UfSioYcftPnLuxxK-AYizQc8ObU385891xfi94maSfLN70xcQ8B7DwTzcebLUW-vHM7uYm2-JbTmKZxXos8DSwZYHPwyEU3my70Ug");'></div>
</div>
</div>
</div>
</div>
</body></html>
