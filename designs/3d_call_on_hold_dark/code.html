<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Call on Hold - Dark Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 flex justify-center items-center min-h-screen">
<!-- iPhone 14 Pro Mockup Container -->
<div class="relative w-[393px] h-[852px] bg-slate-950 rounded-[55px] shadow-2xl overflow-hidden border-[8px] border-slate-800 flex flex-col">
<!-- Status Bar / Dynamic Island Area -->
<div class="h-11 w-full flex items-center justify-between px-8 pt-4">
<span class="text-sm font-semibold">9:41</span>
<!-- Dynamic Island Placeholder -->
<div class="absolute left-1/2 -translate-x-1/2 top-3 w-32 h-9 bg-black rounded-full flex items-center justify-center gap-2 px-4">
<span class="material-symbols-outlined text-primary text-[14px] active-icon">pause_circle</span>
<span class="text-[12px] text-primary font-medium">04:12</span>
</div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[22px]">battery_full</span>
</div>
</div>
<!-- Header -->
<div class="flex items-center p-6 justify-between">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-900/50">
<span class="material-symbols-outlined text-slate-100">keyboard_arrow_down</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[12px] uppercase tracking-widest text-slate-400 font-medium">End-to-end Encrypted</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-900/50">
<span class="material-symbols-outlined text-slate-100">info</span>
</button>
</div>
<!-- Caller Profile Section -->
<div class="flex flex-col items-center mt-8 px-6">
<div class="relative">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-primary/20 bg-slate-800 bg-center bg-cover shadow-lg shadow-primary/10" data-alt="Professional portrait of a man named Alex Rivers" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDT6Nb79WH4O-H-on_kvlV4qrR9IpsHWf506Nx2JlOqWmoE85lvn1JTTs4Ku7kG9sssQEs-4ml2EmtgE9WDpim7iOBq37mvlz5MGK8nBAuzpAT-tHvcTqe0CALFQpjbaJ-yNoSUgg5JekKV1RfBsbJ88wh34TTFEQGiuzU5a9LSWdjh-UOi8f3EC8W40Z9IP7tO_pJbqPvJ8yCD1Eqs-WDrXpi_RYV_DzQEl--9XwhaH3VUFhWBqoKgLGPl1u6uS2bjr0D6JWm9fWE')">
</div>
<div class="absolute -bottom-1 -right-1 bg-primary rounded-full p-1.5 border-4 border-slate-950">
<span class="material-symbols-outlined text-white text-[16px] active-icon">pause</span>
</div>
</div>
<div class="mt-6 flex flex-col items-center gap-1">
<h1 class="text-3xl font-bold tracking-tight text-slate-100">Alex Rivers</h1>
<p class="text-primary font-bold text-lg">On Hold</p>
<p class="text-slate-400 text-base">04:12</p>
</div>
</div>
<!-- Control Grid -->
<div class="grid grid-cols-3 gap-y-8 gap-x-4 px-8 mt-16 mb-auto">
<!-- Mute -->
<div class="flex flex-col items-center gap-2">
<button class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition-colors border border-white/5">
<span class="material-symbols-outlined text-slate-100 text-3xl">mic_off</span>
</button>
<span class="text-xs text-slate-400 font-medium">Mute</span>
</div>
<!-- Keypad -->
<div class="flex flex-col items-center gap-2">
<button class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition-colors border border-white/5">
<span class="material-symbols-outlined text-slate-100 text-3xl">grid_view</span>
</button>
<span class="text-xs text-slate-400 font-medium">Keypad</span>
</div>
<!-- Speaker -->
<div class="flex flex-col items-center gap-2">
<button class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition-colors border border-white/5">
<span class="material-symbols-outlined text-slate-100 text-3xl">volume_up</span>
</button>
<span class="text-xs text-slate-400 font-medium">Speaker</span>
</div>
<!-- Add Call -->
<div class="flex flex-col items-center gap-2">
<button class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition-colors border border-white/5">
<span class="material-symbols-outlined text-slate-100 text-3xl">add_call</span>
</button>
<span class="text-xs text-slate-400 font-medium">Add Call</span>
</div>
<!-- FaceTime -->
<div class="flex flex-col items-center gap-2">
<button class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition-colors border border-white/5">
<span class="material-symbols-outlined text-slate-100 text-3xl">videocam</span>
</button>
<span class="text-xs text-slate-400 font-medium">FaceTime</span>
</div>
<!-- Contacts -->
<div class="flex flex-col items-center gap-2">
<button class="w-16 h-16 rounded-full bg-slate-800 flex items-center justify-center hover:bg-slate-700 transition-colors border border-white/5">
<span class="material-symbols-outlined text-slate-100 text-3xl">account_circle</span>
</button>
<span class="text-xs text-slate-400 font-medium">Contacts</span>
</div>
</div>
<!-- Action Buttons Footer -->
<div class="px-8 pb-12 flex flex-col gap-4">
<!-- Resume Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white h-16 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-2xl active-icon">play_arrow</span>
<span class="text-lg font-bold">Resume Call</span>
</button>
<!-- End Call Button -->
<button class="w-full bg-red-600/20 border border-red-600/30 hover:bg-red-600/30 text-red-500 h-16 rounded-2xl flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-2xl active-icon">call_end</span>
<span class="text-lg font-bold">End Call</span>
</button>
</div>
<!-- Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-white/20 rounded-full"></div>
</div>
</body></html>
