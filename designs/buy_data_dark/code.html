<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 justify-between border-b border-primary/20 sticky top-0 z-10">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Buy Data / SIM Card</h2>
<div class="flex w-10 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-lg h-10 w-10 bg-transparent text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">history</span>
</button>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-24">
<!-- Provider Selection Section -->
<section class="mt-4">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold px-4 mb-4">Select Provider</h3>
<div class="flex overflow-x-auto px-4 gap-4 no-scrollbar">
<!-- Airtel -->
<div class="flex flex-col items-center gap-2 min-w-[72px]">
<div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center ring-2 ring-primary ring-offset-2 ring-offset-background-dark cursor-pointer">
<div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center overflow-hidden">
<div class="bg-red-600 w-full h-full flex items-center justify-center text-white font-bold text-xs">AIRTEL</div>
</div>
</div>
<p class="text-primary text-xs font-bold">Airtel</p>
</div>
<!-- MTN -->
<div class="flex flex-col items-center gap-2 min-w-[72px] opacity-60">
<div class="w-16 h-16 rounded-xl bg-slate-800 flex items-center justify-center cursor-pointer">
<div class="w-12 h-12 bg-yellow-400 rounded-lg flex items-center justify-center text-black font-bold text-xs">MTN</div>
</div>
<p class="text-slate-400 text-xs font-bold">MTN</p>
</div>
<!-- Glo -->
<div class="flex flex-col items-center gap-2 min-w-[72px] opacity-60">
<div class="w-16 h-16 rounded-xl bg-slate-800 flex items-center justify-center cursor-pointer">
<div class="w-12 h-12 bg-green-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">Glo</div>
</div>
<p class="text-slate-400 text-xs font-bold">Glo</p>
</div>
<!-- 9Mobile -->
<div class="flex flex-col items-center gap-2 min-w-[72px] opacity-60">
<div class="w-16 h-16 rounded-xl bg-slate-800 flex items-center justify-center cursor-pointer">
<div class="w-12 h-12 bg-lime-500 rounded-lg flex items-center justify-center text-white font-bold text-xs">9Mob</div>
</div>
<p class="text-slate-400 text-xs font-bold">9Mobile</p>
</div>
</div>
</section>
<!-- Phone Number Input -->
<section class="mt-8 px-4">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold mb-3">Enter Phone Number</h3>
<div class="relative">
<input class="w-full bg-primary/10 border-primary/30 border rounded-xl py-4 px-4 text-slate-100 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="0801 234 5678" type="tel"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary">
<span class="material-symbols-outlined">contact_page</span>
</button>
</div>
</section>
<!-- Package Selection -->
<section class="mt-8 px-4">
<div class="flex items-center justify-between mb-4">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold">Select Package</h3>
<button class="text-primary text-sm font-medium">Filter</button>
</div>
<div class="grid grid-cols-1 gap-3">
<!-- Package Card 1 -->
<label class="relative flex items-center p-4 rounded-xl border border-primary bg-primary/5 cursor-pointer">
<input checked="" class="hidden peer" name="package" type="radio"/>
<div class="flex-1">
<p class="text-slate-100 font-bold">1.5GB Weekly Plan</p>
<p class="text-slate-400 text-sm">Valid for 7 days</p>
</div>
<div class="text-right">
<p class="text-primary font-bold">₦500</p>
</div>
<div class="absolute inset-0 border-2 border-primary rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
<!-- Package Card 2 -->
<label class="relative flex items-center p-4 rounded-xl border border-primary/20 bg-primary/5 cursor-pointer">
<input class="hidden peer" name="package" type="radio"/>
<div class="flex-1">
<p class="text-slate-100 font-bold">2GB Daily Plan</p>
<p class="text-slate-400 text-sm">Valid for 24 hours</p>
</div>
<div class="text-right">
<p class="text-primary font-bold">₦600</p>
</div>
<div class="absolute inset-0 border-2 border-primary rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
<!-- Package Card 3 -->
<label class="relative flex items-center p-4 rounded-xl border border-primary/20 bg-primary/5 cursor-pointer">
<input class="hidden peer" name="package" type="radio"/>
<div class="flex-1">
<p class="text-slate-100 font-bold">5GB Monthly Plan</p>
<p class="text-slate-400 text-sm">Valid for 30 days</p>
</div>
<div class="text-right">
<p class="text-primary font-bold">₦1,500</p>
</div>
<div class="absolute inset-0 border-2 border-primary rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
<!-- Package Card 4 -->
<label class="relative flex items-center p-4 rounded-xl border border-primary/20 bg-primary/5 cursor-pointer">
<input class="hidden peer" name="package" type="radio"/>
<div class="flex-1">
<p class="text-slate-100 font-bold">12GB Monthly Plan</p>
<p class="text-slate-400 text-sm">Valid for 30 days</p>
</div>
<div class="text-right">
<p class="text-primary font-bold">₦3,500</p>
</div>
<div class="absolute inset-0 border-2 border-primary rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
</label>
</div>
</section>
<!-- CTA Button -->
<div class="px-4 mt-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-colors flex items-center justify-center gap-2">
<span>Proceed to Payment</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-primary/20 bg-background-light dark:bg-background-dark px-4 pb-6 pt-2 z-20">
<div class="flex gap-2 max-w-md mx-auto">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined active-icon">storefront</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Store</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">group</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Community</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-medium leading-normal tracking-wide">Profile</p>
</a>
</div>
</nav>
</body></html>
