<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Items to Ship - Logistics Workflow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#0b4c4c",
                "background-light": "#f6f8f8",
                "background-dark": "#112121",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #112121; /* Match background-dark */
        }
        .checkbox-custom:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 px-4 py-4 flex items-center gap-4">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h3 class="text-lg font-bold leading-tight tracking-tight text-slate-900 dark:text-slate-100">Select Items to Ship</h3>
</header>
<main class="flex-1 pb-32">
<!-- Running Totals Bar -->
<div class="px-4 py-4 sticky top-[72px] z-10 bg-background-light dark:bg-background-dark">
<div class="bg-primary rounded-xl p-5 shadow-lg shadow-primary/20 flex flex-col @[480px]:flex-row items-start @[480px]:items-center justify-between gap-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white/80">analytics</span>
<p class="text-white text-base font-semibold leading-tight">3 items selected • 38.5 kg • 0.92 CBM</p>
</div>
</div>
</div>
<!-- Savings Callout -->
<div class="px-4 mb-6">
<div class="bg-emerald-100 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800 rounded-lg p-4 flex items-center gap-3">
<span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400">check_circle</span>
<p class="text-emerald-800 dark:text-emerald-200 text-sm font-medium">
                    Consolidating 3 items saves you <span class="font-bold">~$95</span>
</p>
</div>
</div>
<!-- Item List -->
<div class="px-4 flex flex-col gap-3">
<!-- Item Card 1 -->
<label class="flex items-center gap-4 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl p-4 cursor-pointer hover:border-primary/40 transition-all group">
<div class="flex size-7 items-center justify-center">
<input checked="" class="checkbox-custom h-6 w-6 rounded border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 checked:bg-primary checked:border-primary appearance-none border-2 transition-all" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal">Cotton T-shirts</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Selected for consolidation</p>
</div>
<div class="text-right">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">15.0 kg</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">0.32 CBM</p>
</div>
</label>
<!-- Item Card 2 -->
<label class="flex items-center gap-4 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl p-4 cursor-pointer hover:border-primary/40 transition-all group">
<div class="flex size-7 items-center justify-center">
<input checked="" class="checkbox-custom h-6 w-6 rounded border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 checked:bg-primary checked:border-primary appearance-none border-2 transition-all" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal">Phone Cases</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Selected for consolidation</p>
</div>
<div class="text-right">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">8.5 kg</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">0.15 CBM</p>
</div>
</label>
<!-- Item Card 3 -->
<label class="flex items-center gap-4 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl p-4 cursor-pointer hover:border-primary/40 transition-all group">
<div class="flex size-7 items-center justify-center">
<input checked="" class="checkbox-custom h-6 w-6 rounded border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 checked:bg-primary checked:border-primary appearance-none border-2 transition-all" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal">Extension Cables</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Selected for consolidation</p>
</div>
<div class="text-right">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">15.0 kg</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">0.45 CBM</p>
</div>
</label>
<!-- Unselected Item Example -->
<label class="flex items-center gap-4 bg-white/50 dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl p-4 cursor-pointer hover:border-primary/40 transition-all group opacity-60">
<div class="flex size-7 items-center justify-center">
<input class="checkbox-custom h-6 w-6 rounded border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0 checked:bg-primary checked:border-primary appearance-none border-2 transition-all" type="checkbox"/>
</div>
<div class="flex-1 flex flex-col">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold leading-normal">Organic Tea Sets</p>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal">Available for shipping</p>
</div>
<div class="text-right">
<p class="text-slate-900 dark:text-slate-100 text-base font-bold">12.0 kg</p>
<p class="text-slate-500 dark:text-slate-400 text-xs">0.28 CBM</p>
</div>
</label>
</div>
</main>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-lg border-t border-slate-200 dark:border-primary/20 z-30">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-[0.98] shadow-lg shadow-primary/25">
<span>Continue with 3 items</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</body></html>
