<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Profile Setup - Onboarding Step 3</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                        "field-dark": "#1E1E1E",
                        "neutral-dark": "#121212"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2394a3b8' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-neutral-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center">
<div class="w-full max-w-md flex flex-col min-h-screen">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-4 pt-6">
<button class="text-slate-900 dark:text-slate-100 p-2 hover:bg-primary/10 rounded-lg transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<span class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Step 3 of 4</span>
<div class="flex gap-1.5 mt-2">
<div class="h-1.5 w-6 rounded-full bg-primary"></div>
<div class="h-1.5 w-6 rounded-full bg-primary"></div>
<div class="h-1.5 w-6 rounded-full bg-primary"></div>
<div class="h-1.5 w-6 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</div>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 px-6 pt-8 pb-12">
<!-- Header Text -->
<div class="text-center mb-10">
<h1 class="text-2xl font-bold leading-tight tracking-tight mb-2">Set up your profile</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Tell us a bit more about yourself and your business.</p>
</div>
<!-- Avatar Upload Section -->
<div class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="size-32 rounded-xl bg-field-dark border-2 border-dashed border-slate-700 flex items-center justify-center overflow-hidden cursor-pointer hover:border-primary transition-colors" data-alt="Placeholder for user profile photo upload area">
<div class="flex flex-col items-center text-slate-500">
<span class="material-symbols-outlined text-4xl mb-1">add_a_photo</span>
<span class="text-xs font-medium">Upload photo</span>
</div>
</div>
<button class="absolute -bottom-2 -right-2 bg-primary text-white p-2 rounded-lg shadow-lg hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
</div>
<!-- Form Fields -->
<div class="space-y-5">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">person</span>
<input class="w-full h-14 pl-12 pr-4 bg-field-dark border-none rounded-lg text-slate-100 focus:ring-2 focus:ring-primary placeholder:text-slate-600 text-base" placeholder="e.g. John Doe" type="text"/>
</div>
</div>
<!-- Business Type Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Business Type</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">work</span>
<select class="w-full h-14 pl-12 pr-10 bg-field-dark border-none rounded-lg text-slate-100 focus:ring-2 focus:ring-primary text-base">
<option disabled="" selected="" value="">Select your industry</option>
<option value="tech">Technology &amp; Software</option>
<option value="marketing">Marketing &amp; Creative</option>
<option value="retail">Retail &amp; E-commerce</option>
<option value="consulting">Professional Services</option>
</select>
</div>
</div>
<!-- Country Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Country</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">public</span>
<select class="w-full h-14 pl-12 pr-10 bg-field-dark border-none rounded-lg text-slate-100 focus:ring-2 focus:ring-primary text-base">
<option disabled="" selected="" value="">Select country</option>
<option value="us">United States</option>
<option value="uk">United Kingdom</option>
<option value="ca">Canada</option>
<option value="au">Australia</option>
<option value="de">Germany</option>
</select>
</div>
</div>
</div>
<!-- Submit Button Area -->
<div class="mt-12 space-y-4">
<button class="w-full h-14 bg-primary text-white font-bold rounded-lg shadow-lg shadow-primary/20 hover:bg-opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Complete Setup</span>
<span class="material-symbols-outlined text-xl">chevron_right</span>
</button>
<button class="w-full py-3 text-slate-500 dark:text-slate-400 font-medium text-sm hover:text-slate-300 transition-colors">
                    Skip for now
                </button>
</div>
</main>
<!-- Footer Decoration -->
<footer class="p-6 flex justify-center">
<div class="h-1 w-32 bg-slate-800 rounded-full"></div>
</footer>
</div>
</body></html>
