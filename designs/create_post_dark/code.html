<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                        "accent": "#95c6c6",
                        "surface": "#1b3232",
                        "border-muted": "#366363"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-hidden">
<!-- Top Navigation Bar -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 border-b border-slate-200 dark:border-border-muted justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Create Post</h2>
<div class="flex w-12 items-center justify-end">
<button class="text-primary dark:text-accent text-base font-bold leading-normal tracking-wide hover:opacity-80">Post</button>
</div>
</header>
<!-- User Information Row -->
<div class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[72px] py-2 justify-between">
<div class="flex items-center gap-4">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full h-12 w-12 border border-slate-200 dark:border-border-muted" data-alt="User profile picture showing a smiling man" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB0vEy76kVxIprLr7kbl-v35kyWqrGGelzeSXz7a47yRzWXt7BuKmTIshZOPJiUThMhdJV6lxOhtwgnb_DdP942FdmNE_2M6sp6yVAD92jML3Y9Gdyi5kd7aZU9VGTVI0P7MUMISZ_ymvOXC9Y4TAdIEnYJKd8HFpkw6vyVQwRHkaqM8SqnIhq9AoILbpPS6PIP3-b_3Vb70_uBXhkZQICBr2v_gMTwtnmm8ZV9sXErkkPVr5RYRHaqdgHJGUWDzkZgF1gGY9IVBH8");'></div>
<div class="flex flex-col justify-center">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold leading-tight">Alex Rivera</p>
<div class="flex items-center gap-1 text-slate-500 dark:text-accent/80">
<p class="text-sm font-normal leading-normal">Posting to Public</p>
<span class="material-symbols-outlined text-[18px]">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Content Area -->
<main class="flex-1 overflow-y-auto px-4">
<div class="flex flex-col h-full">
<!-- Category Selectors -->
<div class="flex gap-2 py-3 overflow-x-auto no-scrollbar">
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-surface px-4 border border-transparent hover:border-primary/50 transition-all">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Announcements</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-primary/10 dark:bg-primary text-primary dark:text-white px-4">
<p class="text-sm font-medium">Discussion</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-surface px-4">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Question</p>
</button>
<button class="flex h-8 shrink-0 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-surface px-4">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium">Resources</p>
</button>
</div>
<!-- Text Input Area -->
<div class="flex-1 min-h-[200px] mt-2">
<textarea class="w-full h-full bg-transparent border-none focus:ring-0 text-slate-900 dark:text-slate-100 text-xl placeholder:text-slate-400 dark:placeholder:text-slate-600 resize-none font-display leading-relaxed" placeholder="What's on your mind?"></textarea>
</div>
<!-- Attachment Preview Placeholder (Optional/Visual) -->
<div class="hidden py-4 border-t border-slate-200 dark:border-border-muted">
<!-- Image preview would go here -->
</div>
</div>
</main>
<!-- Footer / Toolbar -->
<footer class="bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-border-muted p-4 space-y-4">
<!-- Character Counter -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center text-sm">
<span class="text-slate-500 dark:text-slate-400 font-medium">Character limit</span>
<span class="text-slate-900 dark:text-slate-100 font-semibold">84/280</span>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-border-muted rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 30%;"></div>
</div>
</div>
<!-- Toolbar Actions -->
<div class="flex items-center justify-between pt-2">
<div class="flex items-center gap-2">
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-accent hover:bg-slate-200 dark:hover:bg-surface transition-colors">
<span class="material-symbols-outlined">image</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-accent hover:bg-slate-200 dark:hover:bg-surface transition-colors">
<span class="material-symbols-outlined">gif_box</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-accent hover:bg-slate-200 dark:hover:bg-surface transition-colors">
<span class="material-symbols-outlined">location_on</span>
</button>
<button class="flex items-center justify-center size-10 rounded-full text-slate-600 dark:text-accent hover:bg-slate-200 dark:hover:bg-surface transition-colors">
<span class="material-symbols-outlined">format_list_bulleted</span>
</button>
</div>
<button class="bg-primary hover:bg-primary/90 text-white px-6 py-2 rounded-full font-bold shadow-lg transition-transform active:scale-95">
                    Post
                </button>
</div>
</footer>
</div>
</body></html>
