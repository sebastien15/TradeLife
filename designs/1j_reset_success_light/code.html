<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "success-green": "#10B981",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Password Reset Successful</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden">
<div class="flex flex-col h-full items-center justify-center px-6 max-w-md mx-auto">
<!-- Success Illustration/Icon Container -->
<div class="relative flex items-center justify-center mb-10">
<!-- Outer Glow / Background Circle -->
<div class="absolute w-32 h-32 bg-success-green/20 rounded-full blur-xl"></div>
<!-- Main Success Circle -->
<div class="relative flex items-center justify-center w-24 h-24 rounded-full border-4 border-success-green bg-success-green/10">
<span class="material-symbols-outlined text-[64px] text-success-green font-bold">
                    check
                </span>
</div>
</div>
<!-- Typography Section -->
<div class="text-center space-y-4 mb-12">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100">
                Password Updated!
            </h1>
<p class="text-base text-slate-600 dark:text-slate-400 max-w-[280px] mx-auto leading-relaxed">
                Your password has been successfully reset. You can now sign in with your new credentials.
            </p>
</div>
<!-- Primary CTA Action -->
<div class="w-full flex flex-col items-stretch space-y-4">
<button class="flex h-12 w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg bg-primary px-5 text-base font-bold leading-normal tracking-wide text-white transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">
                Sign In Now
            </button>
<!-- Secondary Navigation Hint -->
<p class="text-sm text-center text-slate-500 dark:text-slate-500">
                Redirecting to login...
            </p>
</div>
<!-- Decorative Element -->
<div class="mt-24 opacity-10 dark:opacity-20">
<div class="flex space-x-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary/40"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
</div>
</div>
</div>
<!-- Background Pattern/Gradient (Visual Interest) -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-success-green/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
