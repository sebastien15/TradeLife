<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OTP Verification</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom styles for OTP input to hide arrows */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Header -->
<header class="flex items-center justify-between px-4 py-4 md:px-6">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-semibold tracking-tight">Verify Phone</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col items-center px-6 pt-10 max-w-md mx-auto w-full">
<!-- SMS Icon Container -->
<div class="mb-8 flex items-center justify-center w-20 h-20 rounded-full bg-primary/10 dark:bg-primary/20">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1">sms</span>
</div>
<!-- Instructions -->
<div class="text-center mb-10">
<h2 class="text-2xl font-bold mb-3">Verification Code</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">
                Enter the 6-digit code sent to <br/>
<span class="font-medium text-slate-900 dark:text-slate-100">+1 (•••) •••-4592</span>
</p>
</div>
<!-- OTP Input Grid -->
<div class="flex gap-2 sm:gap-3 mb-8 justify-center w-full">
<input autocomplete="one-time-code" class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold bg-slate-200 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all" maxlength="1" placeholder="-" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold bg-slate-200 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all" maxlength="1" placeholder="-" />
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold bg-slate-200 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all" maxlength="1" placeholder="-" />
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold bg-slate-200 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all" maxlength="1" placeholder="-" />
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold bg-slate-200 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all" maxlength="1" placeholder="-" />
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold bg-slate-200 dark:bg-slate-800 border-2 border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all" maxlength="1" placeholder="-" />
</div>
<!-- Timer/Resend Section -->
<div class="mb-10 text-center">
<p class="text-sm text-slate-500 dark:text-slate-500 mb-2">Didn't receive the code?</p>
<button class="text-primary font-semibold hover:underline decoration-2 underline-offset-4">Resend Code</button>
</div>
<!-- Primary CTA -->
<div class="w-full mt-auto mb-10">
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Verify</span>
<span class="material-symbols-outlined text-lg">check_circle</span>
</button>
<button class="w-full mt-4 text-slate-500 dark:text-slate-400 text-sm font-medium hover:text-primary dark:hover:text-primary transition-colors">
                Change Phone Number
            </button>
</div>
</main>
<!-- Footer Security Note -->
<footer class="p-6 text-center">
<div class="flex items-center justify-center gap-2 text-slate-400 dark:text-slate-600 text-xs uppercase tracking-widest font-bold">
<span class="material-symbols-outlined text-xs">lock</span>
            Secure Verification
        </div>
</footer>
</body></html>
