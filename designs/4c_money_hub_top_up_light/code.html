<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Money Hub - Top-Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .custom-radio:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
            background-color: #0b4c4c;
            border-color: #0b4c4c;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-primary/20">
<div class="flex items-center p-4 justify-between max-w-md mx-auto">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight flex-1 text-center">Money Hub</h1>
<div class="size-10"></div> <!-- Spacer for centering -->
</div>
<!-- Tabs -->
<nav class="flex px-4 max-w-md mx-auto">
<a class="flex-1 py-3 text-center text-sm font-semibold text-slate-500 dark:text-slate-400 border-b-2 border-transparent" href="#">
                Withdraw
            </a>
<a class="flex-1 py-3 text-center text-sm font-bold text-primary dark:text-primary border-b-2 border-primary" href="#">
                Top-Up
            </a>
<a class="flex-1 py-3 text-center text-sm font-semibold text-slate-500 dark:text-slate-400 border-b-2 border-transparent" href="#">
                History
            </a>
</nav>
</header>
<main class="max-w-md mx-auto pb-32">
<!-- Hero Balance Card -->
<div class="p-4">
<div class="relative overflow-hidden rounded-xl bg-gradient-to-br from-primary to-[#1a6b6b] p-6 shadow-lg shadow-primary/20" data-alt="Teal gradient background for balance card">
<div class="relative z-10">
<p class="text-primary/30 text-xs font-bold uppercase tracking-widest mb-1 text-white/80">Current Balance</p>
<h2 class="text-white text-4xl font-extrabold tracking-tight mb-4">$2,450.00</h2>
<div class="flex items-center gap-2 text-white/70 text-sm">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span>Secure Wallet Instance</span>
</div>
</div>
<!-- Abstract Decorative Shapes -->
<div class="absolute -right-8 -top-8 size-32 bg-white/10 rounded-full blur-2xl"></div>
<div class="absolute -left-4 -bottom-4 size-24 bg-black/10 rounded-full blur-xl"></div>
</div>
</div>
<!-- Section: Choose Payment Method -->
<section class="px-4 py-2">
<h3 class="text-base font-bold mb-4 text-slate-900 dark:text-slate-100">Choose Payment Method</h3>
<div class="space-y-3">
<!-- MTN -->
<label class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 cursor-pointer hover:border-primary transition-all">
<div class="size-10 flex items-center justify-center rounded-lg bg-yellow-400 text-black font-bold text-xs shrink-0">MTN</div>
<div class="flex-1">
<p class="text-sm font-bold">MTN Mobile Money</p>
<p class="text-xs text-slate-500">Instant deposit • No fees</p>
</div>
<input checked="" class="custom-radio size-5 border-2 border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0" name="payment_method" type="radio"/>
</label>
<!-- Airtel -->
<label class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 cursor-pointer hover:border-primary transition-all">
<div class="size-10 flex items-center justify-center rounded-lg bg-red-600 text-white font-bold text-xs shrink-0">Airtel</div>
<div class="flex-1">
<p class="text-sm font-bold">Airtel Money</p>
<p class="text-xs text-slate-500">Instant deposit • 1% fee</p>
</div>
<input class="custom-radio size-5 border-2 border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0" name="payment_method" type="radio"/>
</label>
<!-- Card -->
<label class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 cursor-pointer hover:border-primary transition-all">
<div class="size-10 flex items-center justify-center rounded-lg bg-slate-800 text-white shrink-0">
<span class="material-symbols-outlined">credit_card</span>
</div>
<div class="flex-1">
<p class="text-sm font-bold">Debit / Credit Card</p>
<p class="text-xs text-slate-500">Visa, Mastercard, Amex</p>
</div>
<input class="custom-radio size-5 border-2 border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0" name="payment_method" type="radio"/>
</label>
<!-- Bank -->
<label class="flex items-center gap-4 p-4 rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 cursor-pointer hover:border-primary transition-all">
<div class="size-10 flex items-center justify-center rounded-lg bg-primary text-white shrink-0">
<span class="material-symbols-outlined">account_balance</span>
</div>
<div class="flex-1">
<p class="text-sm font-bold">Bank Transfer</p>
<p class="text-xs text-slate-500">1-2 business days</p>
</div>
<input class="custom-radio size-5 border-2 border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary focus:ring-offset-0" name="payment_method" type="radio"/>
</label>
</div>
</section>
<!-- Section: Select Amount -->
<section class="px-4 py-6">
<h3 class="text-base font-bold mb-4 text-slate-900 dark:text-slate-100">Select Amount</h3>
<!-- Custom Amount Input -->
<div class="relative mb-6">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-2xl font-bold text-slate-400">$</span>
<input class="w-full bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl py-4 pl-10 pr-4 text-2xl font-bold focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="0.00" type="number"/>
</div>
<!-- Quick Amount Pills -->
<div class="grid grid-cols-4 gap-3">
<button class="py-3 px-2 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-bold hover:bg-primary hover:text-white transition-colors">$10</button>
<button class="py-3 px-2 rounded-lg border border-primary bg-primary/10 dark:bg-primary/20 text-primary text-sm font-bold">$50</button>
<button class="py-3 px-2 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-bold hover:bg-primary hover:text-white transition-colors">$100</button>
<button class="py-3 px-2 rounded-lg border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-sm font-bold hover:bg-primary hover:text-white transition-colors">$500</button>
</div>
</section>
</main>
<!-- Fixed Bottom Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-primary/20">
<div class="max-w-md mx-auto space-y-3">
<div class="flex items-center justify-center gap-2 text-xs text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">lock</span>
<span>Payments are secured with SSL encryption</span>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2">
                Top Up Now
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</body></html>
