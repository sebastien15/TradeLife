<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - Recovery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-lg font-semibold tracking-tight">Forgot Password</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 flex flex-col items-center px-6 pt-8 pb-12 max-w-md mx-auto w-full">
<!-- Hero Illustration -->
<div class="w-full aspect-square max-w-[240px] mb-8 flex items-center justify-center bg-primary/10 rounded-full relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/30 to-transparent"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-8xl mb-2" style="font-variation-settings: 'wght' 200, 'FILL' 0;">lock_reset</span>
</div>
<div class="absolute bottom-0 left-0 right-0 h-1/2 bg-cover bg-center opacity-20" data-alt="Abstract geometric tech pattern with security theme" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAQjzYQjIx3ZKIQQyKWMVf_Oz6tM-8LjnRjQ-eDcT_NFE82P0N8PkRsjTcaXo6eJTQMIdYQtYlvzgIEZjJgHnsQol8r6OmjbowC3SyiMfLGDOP9XLREzpjUkiJILEfbNvDBiwqCtRrJ4se0fNo2SQXeXOAmCuM_mgokH8_U2rKSMQrrNyIem0wm0BgYqNyKcQ7sm5Qi3vTUJGm9J2126jIb5_I7Mf_A6C9QefvXqNqhG5xeWIrPjKJU27VC8QhiOZ7fYFIMGWy3zyw');">
</div>
</div>
<!-- Content Section -->
<div class="text-center mb-10">
<h2 class="text-2xl font-bold mb-3">Recover your account</h2>
<p class="text-slate-600 dark:text-slate-400 text-base leading-relaxed">
                Enter your email or phone number associated with your account and we'll send you a link to reset your password.
            </p>
</div>
<!-- Form Section -->
<form class="w-full space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="recovery-identity">
                    Email or Phone Number
                </label>
<div class="relative">
<input class="block w-full px-4 py-4 rounded-lg bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-primary/30 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="recovery-identity" name="identity" placeholder="e.g. name@example.com" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">
                        alternate_email
                    </span>
</div>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 px-6 rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
                Send Reset Link
            </button>
</form>
<!-- Secondary Support / Footer -->
<div class="mt-auto pt-10 flex flex-col items-center space-y-4">
<button class="text-primary font-medium hover:underline text-sm">
                Try another way
            </button>
<a class="flex items-center gap-2 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition-colors py-2" href="#">
<span class="material-symbols-outlined text-lg">login</span>
<span class="text-sm font-medium">Back to Login</span>
</a>
</div>
</main>
<!-- Success Toast (Hidden by default, shown for structure visualization) -->
<div class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-sm bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3">
<span class="material-symbols-outlined text-green-500">check_circle</span>
<p class="text-sm font-medium">Reset link sent successfully!</p>
</div>
</body></html>
