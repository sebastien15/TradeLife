<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ship Hub - Quote Tab</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0b4c4c;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-primary/20 px-4 py-3 flex items-center justify-between">
<div class="w-10 flex items-center">
<span class="material-symbols-outlined cursor-pointer">menu</span>
</div>
<h2 class="text-lg font-bold tracking-tight text-center flex-1">Ship</h2>
<div class="w-10 flex justify-end">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-primary/20 rounded-full transition-colors">
<span class="material-symbols-outlined text-primary dark:text-slate-100">filter_list</span>
</button>
</div>
</header>
<!-- Ship Tab Navigator -->
<nav class="bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-primary/20">
<div class="flex px-4 overflow-x-auto hide-scrollbar">
<a class="flex-1 py-4 text-center border-b-2 border-primary text-primary dark:text-slate-100 font-bold text-sm whitespace-nowrap px-4" href="#">
                Quote
            </a>
<a class="flex-1 py-4 text-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 font-medium text-sm whitespace-nowrap px-4" href="#">
                Active
            </a>
<a class="flex-1 py-4 text-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 font-medium text-sm whitespace-nowrap px-4" href="#">
                Warehouse
            </a>
<a class="flex-1 py-4 text-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 font-medium text-sm whitespace-nowrap px-4" href="#">
                Docs
            </a>
</div>
</nav>
<main class="flex-1 p-4 space-y-4 max-w-2xl mx-auto w-full pb-32">
<!-- Route Selector Card -->
<section class="bg-white dark:bg-primary/10 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-primary/20">
<div class="flex items-center justify-between gap-4">
<div class="flex-1 space-y-6 relative">
<!-- Vertical Connector Line -->
<div class="absolute left-[11px] top-6 bottom-6 w-0.5 bg-slate-200 dark:bg-primary/30 border-dashed border-l"></div>
<div class="flex items-start gap-3 relative z-10">
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center mt-1">
<div class="w-2 h-2 bg-white rounded-full"></div>
</div>
<div class="flex-1">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Origin</p>
<p class="text-base font-bold dark:text-white">Guangzhou, China 🇨🇳</p>
</div>
</div>
<div class="flex items-start gap-3 relative z-10">
<div class="w-6 h-6 rounded-full border-2 border-primary bg-background-light dark:bg-background-dark flex items-center justify-center mt-1">
<span class="material-symbols-outlined text-[14px] text-primary">location_on</span>
</div>
<div class="flex-1">
<p class="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-wider">Destination</p>
<p class="text-base font-bold dark:text-white">Kigali, Rwanda 🇷🇼</p>
</div>
</div>
</div>
<button class="bg-primary text-white p-3 rounded-xl shadow-lg hover:scale-105 transition-transform active:scale-95">
<span class="material-symbols-outlined">swap_vert</span>
</button>
</div>
</section>
<!-- Cargo Details Card -->
<section class="bg-white dark:bg-primary/10 rounded-xl p-5 shadow-sm border border-slate-100 dark:border-primary/20 space-y-6">
<h3 class="text-sm font-bold uppercase tracking-widest text-primary dark:text-slate-300">Cargo Details</h3>
<!-- Weight Slider -->
<div class="space-y-3">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Gross Weight</label>
<span class="text-lg font-bold text-primary dark:text-white">15,000 kg</span>
</div>
<input class="w-full h-2 bg-slate-200 dark:bg-primary/30 rounded-lg appearance-none cursor-pointer" max="30000" min="0" type="range" value="15000"/>
<div class="flex justify-between text-[10px] text-slate-400 uppercase font-bold">
<span>0 kg</span>
<span>30,000 kg</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Volume Input -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Volume</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-background-dark border border-slate-200 dark:border-primary/40 rounded-lg px-3 py-2 text-base font-bold focus:ring-2 focus:ring-primary focus:border-transparent outline-none" type="text" value="15.5"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 uppercase">CBM</span>
</div>
</div>
<!-- Cargo Type Pills -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Cargo Type</label>
<div class="flex gap-2">
<button class="flex-1 bg-primary text-white text-xs font-bold py-2 rounded-lg border border-primary">General</button>
<button class="flex-1 bg-transparent text-slate-500 dark:text-slate-400 text-xs font-bold py-2 rounded-lg border border-slate-200 dark:border-primary/40">Haz</button>
</div>
</div>
</div>
</section>
<!-- Shipping Mode Selector -->
<section class="space-y-3">
<h3 class="text-sm font-bold uppercase tracking-widest text-primary dark:text-slate-300 px-1">Shipping Mode</h3>
<!-- Option 1: Direct -->
<label class="flex items-center p-4 bg-white dark:bg-primary/10 rounded-xl border-2 border-primary shadow-sm cursor-pointer group">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-primary">rocket_launch</span>
</div>
<div class="flex-1">
<p class="font-bold text-base">Direct Shipment</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Fastest transit, point-to-point delivery</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-3 h-3 bg-primary rounded-full"></div>
</div>
</label>
<!-- Option 2: Warehouse -->
<label class="flex items-center p-4 bg-white dark:bg-primary/10 rounded-xl border border-slate-100 dark:border-primary/20 shadow-sm cursor-pointer group opacity-60 hover:opacity-100 transition-opacity">
<div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-primary/20 flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">warehouse</span>
</div>
<div class="flex-1">
<p class="font-bold text-base">Via TradeLife Warehouse</p>
<p class="text-xs text-slate-500 dark:text-slate-400">Optimized costs through consolidation</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-slate-300 dark:border-primary/40 flex items-center justify-center">
</div>
</label>
</section>
</main>
<!-- Bottom Action & Nav -->
<div class="fixed bottom-0 left-0 right-0 z-50">
<!-- Get Quotes Button -->
<div class="px-4 pb-4">
<button class="w-full max-w-2xl mx-auto bg-primary text-white font-bold py-4 rounded-xl shadow-xl flex items-center justify-center gap-2 hover:brightness-110 active:scale-95 transition-all">
<span>Get Quotes</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Bottom Navigation Bar -->
<div class="bg-white dark:bg-background-dark border-t border-slate-200 dark:border-primary/20 px-4 pb-6 pt-2">
<div class="flex justify-between items-center max-w-2xl mx-auto">
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Home</p>
</a>
<a class="flex flex-col items-center gap-1 text-primary dark:text-slate-100" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">local_shipping</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Ship</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">location_searching</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Track</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">account_balance_wallet</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Wallet</p>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<p class="text-[10px] font-bold uppercase tracking-tighter">Profile</p>
</a>
</div>
</div>
</div>
</body></html>
