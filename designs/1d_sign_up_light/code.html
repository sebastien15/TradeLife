<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - Workflow 1D</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex justify-center">
<div class="w-full max-w-[480px] min-h-screen flex flex-col bg-background-light dark:bg-background-dark shadow-2xl">
<!-- TopAppBar -->
<nav class="flex items-center px-4 py-6">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h3 class="ml-4 text-xl font-bold tracking-tight">Create Account</h3>
</nav>
<main class="flex-1 px-6 pt-4 pb-10">
<!-- Section Header -->
<div class="mb-6">
<h4 class="text-xs font-bold tracking-widest text-primary uppercase opacity-80">Account Details</h4>
</div>
<form class="space-y-5" onsubmit="return false;">
<!-- Full Name Input -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[22px]">person</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-base placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Enter your full name" type="text"/>
</div>
</div>
<!-- Phone or Email Selector + Input -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Phone or Email</label>
<div class="flex gap-2">
<!-- Flag/Country Selector (Rwanda) -->
<div class="relative flex-shrink-0">
<select class="appearance-none h-14 pl-4 pr-10 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-base font-medium">
<option value="RW">🇷🇼 +250</option>
<option value="US">🇺🇸 +1</option>
<option value="KE">🇰🇪 +254</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-sm">expand_more</span>
</div>
</div>
<input class="flex-1 h-14 px-4 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-base placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Phone or email" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[22px]">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/20 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary transition-all text-base placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Create a password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[22px]">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-2 px-1">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-slate-300 dark:border-primary/30 text-primary focus:ring-primary bg-white dark:bg-primary/5" id="terms" type="checkbox"/>
</div>
<label class="text-sm text-slate-600 dark:text-slate-400 leading-tight" for="terms">
                        I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Create Account Primary Button (56pt height) -->
<div class="pt-4 space-y-4">
<button class="w-full h-[56px] bg-primary hover:bg-primary/90 text-white font-bold rounded-xl transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
                        Create Account
                    </button>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
<span class="flex-shrink mx-4 text-slate-400 text-xs font-bold uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-slate-200 dark:border-primary/10"></div>
</div>
<!-- Continue with Google (Outlined) -->
<button class="w-full h-[56px] flex items-center justify-center gap-3 bg-transparent border-2 border-slate-200 dark:border-primary/20 hover:bg-slate-50 dark:hover:bg-primary/5 text-slate-700 dark:text-slate-200 font-semibold rounded-xl transition-all">
<img alt="" class="w-5 h-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrA5N_2aFOajCXZrEsCqBaJPCCk6dJtDzDz31TD4G1xYROsKNFSF4aIfBTPg5quQEYp2NpTTMBR1C-qREoE4vnJYdb0VrdBGX00e8ar_aNhNDz-R_4Dmt09FfE3lbY6Da3N6lMZ6DCtAHQyXnPTjUZwy6Aa7o2canCuqa-JM_vBzraLVXIKYr76-GyLLxwVzQ1xYaKkosnegIXHRdwVVHkdQry5KlJF_6NQuuC5ASz9Ws1MS1zpqytzg6Qlb91W9IQOtuXHxdjr8c"/>
                        Continue with Google
                    </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-slate-600 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Sign In</a>
</p>
</div>
</main>
<!-- Bottom Spacing for Mobile Screens -->
<div class="h-6"></div>
</div>
</body></html>
