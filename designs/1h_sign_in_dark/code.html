<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In - Welcome Back</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Main Container -->
<div class="flex-1 flex flex-col max-w-md mx-auto w-full px-6 py-8">
<!-- Header -->
<header class="mb-10">
<div class="flex items-center mb-8">
<button class="text-slate-900 dark:text-slate-100 p-2 -ml-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
<h1 class="text-3xl font-bold tracking-tight mb-2">Welcome back</h1>
<p class="text-slate-600 dark:text-slate-400">Please enter your details to sign in.</p>
</header>
<!-- Form Section -->
<main class="flex-1">
<div class="space-y-5">
<!-- Phone/Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Phone or Email</label>
<div class="relative">
<input class="w-full h-14 bg-slate-100 dark:bg-primary/10 border border-slate-200 dark:border-primary/30 rounded-lg px-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Enter your phone or email" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<div class="relative flex items-center">
<input class="w-full h-14 bg-slate-100 dark:bg-primary/10 border border-slate-200 dark:border-primary/30 rounded-lg px-4 pr-12 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 dark:placeholder:text-slate-500 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Utilities: Remember Me & Forgot Password -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-slate-300 dark:border-primary/40 bg-transparent text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
</div>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:opacity-80 transition-opacity" href="#">Forgot password?</a>
</div>
<!-- Action Buttons Row -->
<div class="flex gap-3 pt-4">
<button class="flex-1 h-14 bg-primary text-white font-bold rounded-lg hover:brightness-110 active:scale-[0.98] transition-all">
                        Sign In
                    </button>
<button class="w-14 h-14 flex items-center justify-center border border-slate-200 dark:border-primary/30 rounded-lg hover:bg-slate-50 dark:hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">face</span>
</button>
</div>
<!-- Divider -->
<div class="relative my-8 flex items-center py-4">
<div class="flex-grow border-t border-slate-200 dark:border-primary/20"></div>
<span class="flex-shrink mx-4 text-sm text-slate-400 dark:text-slate-500 uppercase tracking-widest font-medium">Or</span>
<div class="flex-grow border-t border-slate-200 dark:border-primary/20"></div>
</div>
<!-- Social Login -->
<button class="w-full h-14 flex items-center justify-center gap-3 border border-slate-200 dark:border-primary/30 bg-transparent rounded-lg hover:bg-slate-50 dark:hover:bg-primary/5 transition-colors group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-slate-100 transition-colors">Continue with Google</span>
</button>
</div>
</main>
<!-- Footer -->
<footer class="mt-auto pt-8 text-center">
<p class="text-sm text-slate-600 dark:text-slate-400">
                Don't have an account? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Sign Up</a>
</p>
</footer>
</div>
</body></html>
