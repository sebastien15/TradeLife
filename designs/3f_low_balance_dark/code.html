<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Low Balance Warning - Calling Workflow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "surface-dark": "#1E1E1E",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .iphone-frame {
            width: 393px;
            height: 852px;
            overflow: hidden;
            position: relative;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-900 flex justify-center items-center min-h-screen">
<!-- iPhone 14 Pro Simulation Container -->
<div class="iphone-frame bg-background-dark shadow-2xl rounded-[3rem] border-[8px] border-slate-800 relative">
<!-- Status Bar -->
<div class="absolute top-0 w-full h-12 flex justify-between items-center px-8 z-50 text-white">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-2 items-center">
<span class="material-symbols-outlined text-lg">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-lg">wifi</span>
<span class="material-symbols-outlined text-lg">battery_full</span>
</div>
</div>
<!-- Underlying Calling Screen (Background) -->
<div class="absolute inset-0 flex flex-col items-center pt-24 pb-12 bg-gradient-to-b from-background-dark to-[#0f0a08]">
<div class="w-32 h-32 rounded-full overflow-hidden mb-6 border-2 border-primary/30">
<img alt="Profile picture" class="w-full h-full object-cover" data-alt="Portrait of a friendly person for caller ID" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxc46UF_hoxTc2tnOyFUcHGxvFSb1iGhtTEecmz4d18AACh5bEGeGhE206H8xUA-WTerGCHaltRji2SHP7LaRjHc9qqJyLiamK3CLDwIUwzfcUkr_Md_JP2fLZIZbMv4fQlRRCopxa4c9COEqN_Xrd2waKomb1b_Pn1jX4k1-Gm13XeACLT3Tr5tsjZhfeZc4ameQQ1RKbQ6HSJHPMyCNNtcHQMn_PaZr_xk_AF0HY3U6arAVwpobONUDys_K_2vNXk73tZryANFE"/>
</div>
<h1 class="text-white text-3xl font-bold mb-2">Sarah Jenkins</h1>
<p class="text-primary font-medium mb-8">Calling...</p>
<!-- Call Controls (Faded) -->
<div class="grid grid-cols-3 gap-8 mt-auto mb-32 opacity-20">
<div class="flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl">mic_off</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl">keyboard</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl">volume_up</span>
</div>
</div>
</div>
</div>
<!-- Scrim / Backdrop Overlay -->
<div class="absolute inset-0 bg-black/60 z-10"></div>
<!-- Bottom Sheet Warning (Dark Mode) -->
<div class="absolute bottom-0 left-0 w-full z-20 flex flex-col items-stretch bg-surface-dark rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/5 pb-10">
<!-- Grab Handle -->
<div class="flex h-6 w-full items-center justify-center">
<div class="h-1.5 w-12 rounded-full bg-white/10 mt-1"></div>
</div>
<div class="px-6 pt-4 pb-2">
<!-- Warning Header -->
<div class="flex flex-col items-center mb-6">
<div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl fill-icon">warning</span>
</div>
<h3 class="text-white tracking-tight text-2xl font-bold leading-tight text-center">Low Balance Alert</h3>
<p class="text-slate-400 text-base font-normal leading-relaxed mt-2 text-center max-w-[280px]">
                        You have less than <span class="text-white font-semibold">2 minutes</span> remaining on this call.
                    </p>
</div>
<!-- Balance Display Card -->
<div class="bg-primary/5 border border-primary/20 rounded-2xl p-6 mb-8 flex flex-col items-center">
<p class="text-slate-400 text-sm font-medium uppercase tracking-widest mb-1">Current Balance</p>
<p class="text-white tracking-tight text-4xl font-bold leading-none">$0.45</p>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
<span>Add $10.00 Credit</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-transparent text-slate-400 text-base font-semibold leading-normal tracking-wide hover:text-white transition-colors">
<span>Dismiss and continue</span>
</button>
</div>
</div>
<!-- Home Indicator -->
<div class="flex justify-center mt-4">
<div class="h-1.5 w-32 bg-white/10 rounded-full"></div>
</div>
</div>
</div>
</body></html>
