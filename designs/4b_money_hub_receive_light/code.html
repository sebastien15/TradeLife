<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Money Hub - Receive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0b4c4c",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display">
<!-- Header & Navigation -->
<header class="sticky top-0 z-10 bg-background-light dark:bg-background-dark border-b border-slate-200 dark:border-primary/20">
<div class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-white flex size-10 items-center justify-center hover:bg-slate-100 dark:hover:bg-primary/20 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Money Hub</h2>
</div>
<!-- Tab Bar -->
<div class="flex px-4">
<button class="flex-1 flex flex-col items-center justify-center border-b-2 border-transparent text-slate-500 dark:text-slate-400 pb-3 pt-2 hover:text-primary dark:hover:text-primary transition-colors">
<span class="text-sm font-bold tracking-wide">Send</span>
</button>
<button class="flex-1 flex flex-col items-center justify-center border-b-2 border-primary text-primary pb-3 pt-2">
<span class="text-sm font-bold tracking-wide">Receive</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-4 py-8 max-w-md mx-auto w-full space-y-8">
<!-- QR Code Section -->
<div class="flex flex-col items-center space-y-4">
<div class="relative bg-white p-6 rounded-xl shadow-xl dark:shadow-primary/5">
<div class="w-64 h-64 bg-slate-50 flex items-center justify-center relative overflow-hidden rounded-lg">
<!-- Placeholder for QR Code with Brand Overlay -->
<img alt="Payment QR code for receiving money" class="w-full h-full object-contain" data-alt="A large clean QR code with a primary color brand logo in center" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAjFYGUN1u6rhzR7H6dvryoWWujFhyKSPqApOkOUgMQ0IHNLEdRoAhGHmQgTmckPtfydX2n1Ku7AWATMAS7hiciSiWcSwHW5u64G9wqiriJBylbNptni4MqjQVO5oiqvANK5miWlM5x1TBkfUDwMmLeOHkKyTLL6g1p4swosYDxS78_UEGdDVY0YjD4cm63Fpvg7u5rRDXR-GyltyPFhxe7o5LZsmFN0LkYHrWcaUelKkm7fjBjcMntHPzvu7Or_60Abi5Xt1VVqY"/>
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-white p-2 rounded-lg shadow-md border border-slate-100">
<span class="material-symbols-outlined text-primary text-3xl">account_balance_wallet</span>
</div>
</div>
</div>
</div>
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium text-center">Scan this code to pay me instantly</p>
</div>
<!-- Account Details Card -->
<div class="bg-slate-100 dark:bg-primary/10 rounded-xl overflow-hidden border border-slate-200 dark:border-primary/20">
<!-- Name Row -->
<div class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-primary/20">
<div class="space-y-0.5">
<p class="text-xs uppercase tracking-wider text-slate-500 dark:text-slate-500 font-semibold">Account Holder</p>
<p class="text-base font-bold text-slate-900 dark:text-slate-100">Jane Alex Doe</p>
</div>
<button class="text-primary p-2 hover:bg-primary/10 rounded-lg transition-colors">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
<!-- Phone Row -->
<div class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-primary/20">
<div class="space-y-0.5">
<p class="text-xs uppercase tracking-wider text-slate-500 dark:text-slate-500 font-semibold">Phone Number</p>
<p class="text-base font-bold text-slate-900 dark:text-slate-100">+1 (234) 567 890</p>
</div>
<button class="text-primary p-2 hover:bg-primary/10 rounded-lg transition-colors">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
<!-- Account Number Row -->
<div class="flex items-center justify-between p-4">
<div class="space-y-0.5">
<p class="text-xs uppercase tracking-wider text-slate-500 dark:text-slate-500 font-semibold">Account Number</p>
<p class="text-base font-mono font-bold text-slate-900 dark:text-slate-100 tracking-wider">9876 5432 1098</p>
</div>
<button class="text-primary p-2 hover:bg-primary/10 rounded-lg transition-colors">
<span class="material-symbols-outlined">content_copy</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 pt-4">
<button class="w-full bg-primary hover:bg-opacity-90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">share</span>
                Share QR Code
            </button>
<button class="w-full border-2 border-primary text-primary hover:bg-primary/5 font-bold py-4 rounded-xl flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined">content_copy</span>
                Copy All Details
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 bg-slate-50 dark:bg-background-dark border-t border-slate-200 dark:border-primary/20 pb-safe">
<div class="flex gap-2 px-4 pb-3 pt-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-[#95c6c6] opacity-60" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-xs font-medium leading-normal tracking-tight">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-[#95c6c6] opacity-60" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<p class="text-xs font-medium leading-normal tracking-tight">Wallet</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary dark:text-white" href="#">
<div class="bg-primary/10 dark:bg-primary rounded-full p-2 flex h-10 w-10 items-center justify-center mb-1">
<span class="material-symbols-outlined !text-2xl">qr_code_scanner</span>
</div>
<p class="text-xs font-bold leading-normal tracking-tight">Pay</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-[#95c6c6] opacity-60" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">savings</span>
</div>
<p class="text-xs font-medium leading-normal tracking-tight">Savings</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-[#95c6c6] opacity-60" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium leading-normal tracking-tight">Profile</p>
</a>
</div>
</nav>
</body></html>
